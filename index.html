<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>League Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">
    <i class="fa-solid fa-trophy"></i>
    <span>League Manager</span>
  </div>

  <div class="nav-actions">
    <button id="loginBtn" class="btn primary">
      <i class="fa-brands fa-google"></i> Sign In
    </button>

    <button id="logoutBtn" class="btn danger" style="display:none;">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </div>
</header>

<section class="hero">
  <h1>Professional PS5 League Management</h1>
  <p>Create leagues, track standings, calculate points automatically and monitor ranking movement.</p>
</section>

<main class="container">

  <section id="adminPanel" class="card" style="display:none;">
    <h2><i class="fa-solid fa-plus"></i> Create League</h2>

    <div class="form-group">
      <input type="text" id="leagueName" placeholder="Enter league name">
      <button id="createLeagueBtn" class="btn primary">
        <i class="fa-solid fa-floppy-disk"></i> Save League
      </button>
    </div>
  </section>

  <section>
    <h2><i class="fa-solid fa-table"></i> Available Leagues</h2>
    <div id="leaguesGrid" class="grid"></div>
  </section>

</main>

<footer>
  <p>© 2026 League Manager. All rights reserved.</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
