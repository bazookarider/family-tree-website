<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="topbar">
      <h1>StudyHub AI</h1>
      <p>Your private study assistant for handouts, summaries, quizzes, and exam prep.</p>
    </header>

    <main class="main-content">
      <section class="auth-section card">
        <div class="tabs">
          <button class="tab-btn active" id="showLogin">Login</button>
          <button class="tab-btn" id="showRegister">Register</button>
        </div>

        <div id="loginForm" class="form-box">
          <h2>Login</h2>
          <input type="email" id="loginEmail" placeholder="Enter your email" />
          <input type="password" id="loginPassword" placeholder="Enter your password" />
          <button id="loginBtn" class="primary-btn">Login</button>
          <p id="loginMessage" class="message"></p>
        </div>

        <div id="registerForm" class="form-box hidden">
          <h2>Create Account</h2>
          <input type="text" id="registerName" placeholder="Full name" />
          <input type="email" id="registerEmail" placeholder="Enter your email" />
          <input type="password" id="registerPassword" placeholder="Create password" />
          <button id="registerBtn" class="primary-btn">Register</button>
          <p id="registerMessage" class="message"></p>
        </div>
      </section>

      <section class="dashboard-section card hidden" id="dashboard">
        <div class="dashboard-header">
          <h2>Student Dashboard</h2>
          <button id="logoutBtn" class="danger-btn">Logout</button>
        </div>

        <div class="welcome-box">
          <p id="welcomeText">Welcome, Student</p>
        </div>

        <div class="upload-box">
          <h3>Upload Handout</h3>
          <input type="file" id="handoutFile" accept=".pdf,.txt,.doc,.docx" />
          <button id="uploadBtn" class="primary-btn">Upload Handout</button>
          <p id="uploadMessage" class="message"></p>
        </div>

        <div class="tools-grid">
          <button class="tool-btn" data-action="summary">Generate Summary</button>
          <button class="tool-btn" data-action="questions">Likely Exam Questions</button>
          <button class="tool-btn" data-action="quiz">Create Quiz</button>
          <button class="tool-btn" data-action="explain">Explain Difficult Parts</button>
          <button class="tool-btn" data-action="revision">Short Revision Notes</button>
          <button class="tool-btn" data-action="topics">Extract Key Topics</button>
        </div>

        <div class="ask-ai-box">
          <h3>Ask AI About a Topic</h3>
          <textarea id="aiPrompt" rows="5" placeholder="Example: Explain Big O notation in a very simple way"></textarea>
          <button id="askAiBtn" class="primary-btn">Ask AI</button>
        </div>

        <div class="result-box">
          <h3>Output</h3>
          <div id="aiOutput">
            <p>Your generated summary, quiz, explanation, or answer will appear here.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
